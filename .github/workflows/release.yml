# Release on merge. Every PR merge into main:
#   1. prepare — bumps the patch version in VERSION, commits it back to main
#      ([skip ci]), and creates a `v<version>` tag. Runs once so both platforms
#      build the SAME version (no per-machine coordination).
#   2. build  — matrix over ubuntu-latest + windows-latest, checking out the
#      tag, building the platform's distribution files with --no-bump.
#   3. release — creates a GitHub Release on the tag with all assets attached.
#
# Works on the free GitHub plan (private repos get 2,000 Actions min/month;
# Windows builds are billed at 2x). Cancel-in-progress is off so a release in
# flight always finishes even if another merge lands.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # commit VERSION bump, push tag, create release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    # Skip the workflow's own VERSION-bump commit to avoid a loop.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.commit.outputs.sha }}
      skipped: ${{ steps.skip-check.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # A PAT is not required for the default GITHUB_TOKEN to push back to
          # the same repo, but fetch-depth 0 is needed so the tag push is clean.
          fetch-depth: 0

      # Dependabot PRs land routinely (every batch of version bumps) and
      # don't warrant their own release — they ride out with the next
      # user-facing release. github.actor is unreliable for squash-merged
      # dependabot PRs (the merger becomes the author), so look up the
      # originating PR via the commits API and check its real author. This
      # also defeats the "Confused Deputy" pattern documented in the
      # dependabot-triage skill, where an attacker imitates the bot identity.
      - name: Check if release should be skipped (Dependabot PR)
        id: skip-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Not a push event (${{ github.event_name }}); proceeding."
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA="${{ github.event.head_commit.sha }}"
          if [ -z "$SHA" ]; then
            echo "::warning::No head_commit SHA on push event; proceeding with release."
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          AUTHOR=$(gh api "repos/${{ github.repository }}/commits/${SHA}/pulls" \
            --jq '.[0].user.login // empty' 2>/dev/null || echo "")
          if [ "$AUTHOR" = "app/dependabot" ]; then
            echo "::notice::Skipping release: $SHA was merged from a Dependabot PR."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Proceeding with release (PR author: ${AUTHOR:-none/direct-push})."
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version (race-safe)
        id: bump
        if: ${{ steps.skip-check.outputs.skipped != 'true' }}
        run: |
          set -euo pipefail
          # Re-fetch to see tags pushed by concurrent runs. --prune-tags drops
          # any local tag that no longer exists on remote, which prevents us
          # from reusing a stale v0.1.54 pointing at an orphan commit.
          git fetch origin main --tags --prune --prune-tags --force
          # Refuse to bump if the trigger commit isn't actually on origin/main.
          # That would mean the bump is a divergent branch no release should
          # build from. (Direct pushes to main are blocked by branch
          # protection, so this is a safety net rather than a normal case.)
          TRIGGER_SHA="${{ github.event.head_commit.sha }}"
          if [ -n "$TRIGGER_SHA" ] \
            && ! git merge-base --is-ancestor "$TRIGGER_SHA" origin/main; then
            echo "::error::Trigger commit $TRIGGER_SHA is not on origin/main; refusing to bump."
            exit 1
          fi
          # Re-read VERSION: a concurrent run may have already pushed a bump
          # while we were queued. If it did, that run will publish the release;
          # we just need to surface the tag it produced.
          OLD="$(tr -d '[:space:]' < VERSION)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
          PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW" > VERSION
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $OLD -> $NEW (from $(git rev-parse --short HEAD))"

      - name: Commit VERSION + create tag (idempotent, retried)
        id: commit
        if: ${{ steps.skip-check.outputs.skipped != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.version }}"
          TAG="${{ steps.bump.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If the tag already exists on remote, a concurrent run won the race.
          # Adopt it as the release target instead of failing — that run will
          # publish the release. Refuse only if the tag is orphaned (not
          # reachable from origin/main), which signals the repo is in an
          # inconsistent state and a human needs to clean it up.
          EXISTING_SHA=$(git ls-remote origin "refs/tags/$TAG" 2>/dev/null \
                         | awk '{print $1}')
          if [ -n "$EXISTING_SHA" ]; then
            if git merge-base --is-ancestor "$EXISTING_SHA" origin/main; then
              echo "Tag $TAG already exists on remote at $EXISTING_SHA; adopting it."
              echo "sha=$EXISTING_SHA" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "::error::Tag $TAG exists at $EXISTING_SHA but is not reachable from origin/main."
              echo "        This means a previous run pushed a tag whose commit is not on main."
              echo "        Recover with: git push origin --delete $TAG"
              exit 1
            fi
          fi

          git add VERSION
          git commit -m "chore(release): $VERSION [skip ci]"
          git tag "$TAG"

          # Push with backoff. Between checkout and push, another run may
          # have advanced origin/main, making our push non-fast-forward.
          # Reset onto origin/main, re-read VERSION (now bumped by them),
          # and commit the *next* version. Cap at 5 attempts to bound CI
          # minutes; if a real contention storm is happening, surface the
          # error rather than spin forever.
          PUSHED=false
          for attempt in 1 2 3 4 5; do
            if git push origin main --tags; then
              echo "Pushed on attempt $attempt."
              PUSHED=true
              break
            fi
            echo "Push attempt $attempt failed; rebasing onto origin/main and re-bumping."
            git reset --hard origin/main
            git tag -d "$TAG" 2>/dev/null || true
            OLD="$(tr -d '[:space:]' < VERSION)"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
            PATCH=$((PATCH + 1))
            NEW="${MAJOR}.${MINOR}.${PATCH}"
            TAG="v$NEW"
            echo "$NEW" > VERSION
            echo "Re-bumping to $TAG after concurrent run."
            git add VERSION
            git commit -m "chore(release): $NEW [skip ci]"
            git tag "$TAG"
            sleep $((attempt * 2))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::error::Failed to push release after 5 attempts. Manual cleanup required."
            exit 1
          fi

          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    # Skip when prepare was skipped (Dependabot PR). Otherwise the matrix
    # would check out an empty tag and fail.
    if: ${{ needs.prepare.outputs.skipped != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: ./build-linux.sh
            artifact: linux
          - os: windows-latest
            script: ./build.sh
            artifact: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (at release tag)
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        # bash is required even on windows-latest: the default shell there is
        # pwsh, which can't parse `VAR=$(...)`, `${VAR}`, or `$GITHUB_PATH`.
        # Without this, the Windows build leg fails instantly and — because
        # `release` needs the whole `build` matrix — no Release is created.
        shell: bash
        run: |
          WAILS_VERSION=$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2)
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # frontend/wailsjs/ is gitignored — a fresh checkout has none. The build
      # scripts call `npm run build` (vite), which imports from wailsjs; without
      # regeneration the build fails with "Could not resolve ../../wailsjs/...".
      # Mirror ci.yml: placeholder dist → npm install → npm run generate.
      - name: Regenerate Wails bindings (gitignored on fresh checkout)
        shell: bash
        run: |
          cd frontend
          npm install
          mkdir -p ../frontend/dist
          printf '<!doctype html><html><head><title>ci</title></head><body></body></html>' > ../frontend/dist/index.html
          npm run generate

      # --- platform-specific native build deps ---
      - name: Install Linux deps (webkit2gtk-4.1 + GTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev build-essential pkg-config

      - name: Install NSIS and expose makensis
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # The Chocolatey `nsis` package installs makensis.exe to
          # C:\Program Files (x86)\NSIS but does NOT shim it onto PATH and
          # does NOT update the registry PATH, so Get-Command / a PATH sync
          # both miss a successful install. Resolve the binary by its known
          # install location instead.
          $candidates = @(
            'C:\Program Files (x86)\NSIS',
            'C:\Program Files\NSIS',
            "$env:ProgramData\chocolatey\bin"
          )
          function Find-Makensis {
            foreach ($d in $candidates) {
              $p = Join-Path $d 'makensis.exe'
              if (Test-Path $p) { return $p }
            }
            return $null
          }

          $makensis = Find-Makensis
          if (-not $makensis) {
            $maxRetries = 3
            for ($i = 1; $i -le $maxRetries; $i++) {
              Write-Host "Installing NSIS via Chocolatey (attempt $i of $maxRetries)..."
              & choco install nsis -y --no-progress
              $code = $LASTEXITCODE
              $makensis = Find-Makensis
              if ($code -eq 0 -and $makensis) {
                Write-Host "NSIS installed successfully."
                break
              }
              Write-Host "Attempt $i failed (choco exit: $code). Retrying in 15s..."
              Start-Sleep -Seconds 15
              if ($i -eq $maxRetries) {
                Write-Error "Failed to install NSIS after $maxRetries attempts (Chocolatey API may be down)."
                exit 1
              }
            }
          }

          $nsisBin = Split-Path $makensis -Parent
          Write-Host "Using makensis: $makensis"
          # Expose to this session and to every following step (the build
          # runs under bash, which only sees GITHUB_PATH additions).
          $env:PATH = "$nsisBin;$env:PATH"
          Add-Content -Path $env:GITHUB_PATH -Value $nsisBin
          Write-Host "Added $nsisBin to GITHUB_PATH."

      - name: Build distribution (--no-bump, version pinned by tag)
        shell: bash
        run: ${{ matrix.script }} --no-bump

      - name: Normalize artifact path
        id: path
        shell: bash
        run: |
          # The build scripts emit into distributions/v<version>/.
          echo "dir=distributions/v${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"

      # --- SignPath code signing (Windows only) ---------------------------
      # Signs the NSIS installer so it doesn't trigger Microsoft Defender
      # SmartScreen's "Unknown publisher" warning. Free for OSS via
      # SignPath Foundation (https://signpath.org). No-op until you add
      # SIGNPATH_API_TOKEN (repo Secret) + SIGNPATH_ORGANIZATION_ID (repo
      # Variable) — see CODE_SIGNING.md for the manual setup checklist
      # (also tracked in the issue that prompted this change).
      #
      # Only the installer is signed here. To extend to the portable .zip,
      # add a second entry under .signpath/artifact-configurations/ and
      # mirror the upload→sign→replace block below for the zip artifact.
      - name: Upload unsigned installer for SignPath
        id: upload-unsigned-installer
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: actions/upload-artifact@v7
        with:
          name: silt-installer-unsigned
          path: ${{ steps.path.outputs.dir }}/silt-v${{ needs.prepare.outputs.version }}-windows-installer.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign installer with SignPath
        id: sign-installer
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: 'Silt'
          signing-policy-slug: 'release-signing'
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ runner.temp }}/signed-installer

      - name: Replace unsigned installer with signed
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != '' && steps.sign-installer.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          # SignPath returns the signed file under the same basename.
          cp -v "${{ runner.temp }}/signed-installer/"*.exe "${{ steps.path.outputs.dir }}/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.artifact }}
          path: ${{ steps.path.outputs.dir }}/*
          if-no-files-found: error

  release:
    needs: [prepare, build]
    # Skip when prepare was skipped (Dependabot PR). The whole release is a
    # no-op in that case — the bumped commit+tag will still be on main from
    # the next user-facing release.
    if: ${{ needs.prepare.outputs.skipped != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # cosign keyless signing via GitHub OIDC (#253, F18)
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: dist-*
          merge-multiple: true

      # --- SBOM (SPDX) via syft (#253, F18) -------------------------------
      # Covers both dep trees: Go modules (go.mod) and npm packages
      # (frontend/package-lock.json). syft scans the checkout recursively and
      # emits SPDX JSON, the format most widely consumed by security tooling.
      - name: Generate SBOM (SPDX)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft dir:. -o spdx-json \
            --file "release-assets/silt-sbom-v${VERSION}.spdx.json"

      # --- cosign keyless signing (#253, F18) -----------------------------
      # Signs the Linux .deb + .AppImage keyless via GitHub OIDC (Sigstore
      # Fulcio). No long-lived signing key to manage — the signature +
      # certificate are attached alongside the artifacts so a downloader can
      # verify provenance via `cosign verify-blob` (see CODE_SIGNING.md). The
      # Windows installer is separately Authenticode-signed via SignPath in the
      # build matrix above; this step touches only Linux artifacts.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Linux artifacts (keyless via GitHub OIDC)
        run: |
          set -euo pipefail
          shopt -s nullglob
          for artifact in release-assets/*.deb release-assets/*.AppImage; do
            echo "Signing $artifact"
            cosign sign-blob --yes \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem" \
              "$artifact"
          done

      # --- SHA256SUMS (#312) ----------------------------------------------
      # Publishes a sha256sum-compatible checksums file covering the executable
      # binary assets only (*.exe, *.deb, *.AppImage). The in-app updater
      # downloads this alongside its chosen asset and verifies the asset's
      # SHA256 against it before executing — the lightweight first-line
      # integrity check (complementary to the cosign/SignPath signatures, which
      # remain a separate, stronger trust path). nullglob keeps the glob a
      # no-op if a given extension has no asset this release.
      - name: Generate SHA256SUMS for binary assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Match on exact extensions so sigs (.sig/.pem), SBOM (.spdx.json),
          # and SHA256SUMS itself are never included — those are not executable
          # binaries and are verified by their own trust path.
          rm -f release-assets/SHA256SUMS
          (cd release-assets && sha256sum -- *.exe *.deb *.AppImage > SHA256SUMS)
          echo "Generated release-assets/SHA256SUMS:"
          cat release-assets/SHA256SUMS

      # Deterministic backstop for the create-pr skill's soft 'always overwrite'
      # rule: fails the release if any bullet from the previous published release
      # reappears verbatim in docs/releases/unreleased.md (the regression where a
      # PR prepended its section onto the prior notes instead of overwriting).
      - name: Guard against accumulated release notes
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/releases/unreleased.md"
          # Stub/missing notes → the create step falls back to --generate-notes,
          # so there is nothing to accumulate.
          if [ ! -f "$NOTES_FILE" ] || grep -q "Next release notes go here" "$NOTES_FILE"; then
            echo "No curated notes; skipping accumulation guard."
            exit 0
          fi
          # The current tag isn't published yet, so the newest existing release
          # is the previous one. gh release list only returns published releases,
          # guaranteeing PREV_TAG has a body to compare against.
          PREV_TAG=$(gh release list --repo "${{ github.repository }}" \
                       --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            echo "No previous release found; skipping accumulation guard."
            exit 0
          fi
          echo "Checking $CURRENT_TAG notes for content carried over from $PREV_TAG."
          TMP_BULLETS="$(mktemp)"
          gh release view "$PREV_TAG" --repo "${{ github.repository }}" \
            --json body --jq .body \
            | grep -E '^[[:space:]]*[-*][[:space:]]+' \
            | sed -E 's/^[[:space:]]*[-*][[:space:]]+//' \
            | awk 'length($0) >= 10' \
            | sort -u > "$TMP_BULLETS" || true
          if [ ! -s "$TMP_BULLETS" ]; then
            echo "Previous release $PREV_TAG has no parseable bullets; skipping."
            rm -f "$TMP_BULLETS"
            exit 0
          fi
          # Fixed-string match so em dashes / parens / backticks are literal, not
          # regex. length >= 10 above drops placeholder stubs from consideration.
          OVERLAPS=$(grep -F -f "$TMP_BULLETS" "$NOTES_FILE" || true)
          rm -f "$TMP_BULLETS"
          if [ -n "$OVERLAPS" ]; then
            echo "::error::docs/releases/unreleased.md reuses bullets that already shipped in $PREV_TAG."
            echo "::error::The create-pr skill must OVERWRITE the file each PR — not append. Overlapping lines:"
            printf '%s\n' "$OVERLAPS" | sed 's/^/    | /'
            echo "::error::Rewrite the notes to describe only this PR's changes, then re-trigger the release."
            exit 1
          fi
          echo "Notes are clean — no overlap with $PREV_TAG."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Attaching release assets:"
          ls -laR release-assets/
          # Notes: prefer the user-facing notes drafted by the create-pr skill
          # (docs/releases/unreleased.md). If the file is missing or still holds
          # the stub comment, fall back to --generate-notes (auto-generated PR
          # list). The fallback is loud on purpose — it means a PR was merged
          # without running the create-pr skill.
          NOTES_FILE="docs/releases/unreleased.md"
          if [ -f "$NOTES_FILE" ] && ! grep -q "Next release notes go here" "$NOTES_FILE"; then
            echo "Using curated release notes from $NOTES_FILE"
            NOTES_ARGS=(--notes-file "$NOTES_FILE")
          else
            echo "::warning::No curated notes in $NOTES_FILE; falling back to --generate-notes."
            NOTES_ARGS=(--generate-notes)
          fi
          # Use --target with the SHA of the bumped commit (where the tag actually lives).
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --target "${{ needs.prepare.outputs.sha }}" \
            --title "v${{ needs.prepare.outputs.version }}" \
            "${NOTES_ARGS[@]}" \
            release-assets/*
