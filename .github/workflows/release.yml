# Release on merge. Every PR merge into main:
#   1. prepare — bumps the patch version in VERSION, commits it back to main
#      ([skip ci]), and creates a `v<version>` tag. Runs once so both platforms
#      build the SAME version (no per-machine coordination).
#   2. build  — matrix over ubuntu-latest + windows-latest, checking out the
#      tag, building the platform's distribution files with --no-bump.
#   3. release — creates a GitHub Release on the tag with all assets attached.
#
# Works on the free GitHub plan (private repos get 2,000 Actions min/month;
# Windows builds are billed at 2x). Cancel-in-progress is off so a release in
# flight always finishes even if another merge lands.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # commit VERSION bump, push tag, create release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    # Skip the workflow's own VERSION-bump commit to avoid a loop.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # A PAT is not required for the default GITHUB_TOKEN to push back to
          # the same repo, but fetch-depth 0 is needed so the tag push is clean.
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          set -euo pipefail
          OLD="$(tr -d '[:space:]' < VERSION)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
          PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW" > VERSION
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $OLD -> $NEW"

      - name: Commit VERSION + create tag
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore(release): ${{ steps.bump.outputs.version }} [skip ci]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin main --tags
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: ./build-linux.sh
            artifact: linux
          - os: windows-latest
            script: ./build.sh
            artifact: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (at release tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        # bash is required even on windows-latest: the default shell there is
        # pwsh, which can't parse `VAR=$(...)`, `${VAR}`, or `$GITHUB_PATH`.
        # Without this, the Windows build leg fails instantly and — because
        # `release` needs the whole `build` matrix — no Release is created.
        shell: bash
        run: |
          WAILS_VERSION=$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2)
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # frontend/wailsjs/ is gitignored — a fresh checkout has none. The build
      # scripts call `npm run build` (vite), which imports from wailsjs; without
      # regeneration the build fails with "Could not resolve ../../wailsjs/...".
      # Mirror ci.yml: placeholder dist → npm install → npm run generate.
      - name: Regenerate Wails bindings (gitignored on fresh checkout)
        shell: bash
        run: |
          cd frontend
          npm install
          mkdir -p ../frontend/dist
          printf '<!doctype html><html><head><title>ci</title></head><body></body></html>' > ../frontend/dist/index.html
          npm run generate

      # --- platform-specific native build deps ---
      - name: Install Linux deps (webkit2gtk-4.1 + GTK)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev build-essential pkg-config

      - name: Install NSIS and expose makensis
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # The Chocolatey `nsis` package installs makensis.exe to
          # C:\Program Files (x86)\NSIS but does NOT shim it onto PATH and
          # does NOT update the registry PATH, so Get-Command / a PATH sync
          # both miss a successful install. Resolve the binary by its known
          # install location instead.
          $candidates = @(
            'C:\Program Files (x86)\NSIS',
            'C:\Program Files\NSIS',
            "$env:ProgramData\chocolatey\bin"
          )
          function Find-Makensis {
            foreach ($d in $candidates) {
              $p = Join-Path $d 'makensis.exe'
              if (Test-Path $p) { return $p }
            }
            return $null
          }

          $makensis = Find-Makensis
          if (-not $makensis) {
            $maxRetries = 3
            for ($i = 1; $i -le $maxRetries; $i++) {
              Write-Host "Installing NSIS via Chocolatey (attempt $i of $maxRetries)..."
              & choco install nsis -y --no-progress
              $code = $LASTEXITCODE
              $makensis = Find-Makensis
              if ($code -eq 0 -and $makensis) {
                Write-Host "NSIS installed successfully."
                break
              }
              Write-Host "Attempt $i failed (choco exit: $code). Retrying in 15s..."
              Start-Sleep -Seconds 15
              if ($i -eq $maxRetries) {
                Write-Error "Failed to install NSIS after $maxRetries attempts (Chocolatey API may be down)."
                exit 1
              }
            }
          }

          $nsisBin = Split-Path $makensis -Parent
          Write-Host "Using makensis: $makensis"
          # Expose to this session and to every following step (the build
          # runs under bash, which only sees GITHUB_PATH additions).
          $env:PATH = "$nsisBin;$env:PATH"
          Add-Content -Path $env:GITHUB_PATH -Value $nsisBin
          Write-Host "Added $nsisBin to GITHUB_PATH."

      - name: Build distribution (--no-bump, version pinned by tag)
        shell: bash
        run: ${{ matrix.script }} --no-bump

      - name: Normalize artifact path
        id: path
        shell: bash
        run: |
          # The build scripts emit into distributions/v<version>/.
          echo "dir=distributions/v${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"

      # --- SignPath code signing (Windows only) ---------------------------
      # Signs the NSIS installer so it doesn't trigger Microsoft Defender
      # SmartScreen's "Unknown publisher" warning. Free for OSS via
      # SignPath Foundation (https://signpath.org). No-op until you add
      # SIGNPATH_API_TOKEN (repo Secret) + SIGNPATH_ORGANIZATION_ID (repo
      # Variable) — see CODE_SIGNING.md for the manual setup checklist
      # (also tracked in the issue that prompted this change).
      #
      # Only the installer is signed here. To extend to the portable .zip,
      # add a second entry under .signpath/artifact-configurations/ and
      # mirror the upload→sign→replace block below for the zip artifact.
      - name: Upload unsigned installer for SignPath
        id: upload-unsigned-installer
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: silt-installer-unsigned
          path: ${{ steps.path.outputs.dir }}/silt-v${{ needs.prepare.outputs.version }}-windows-installer.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign installer with SignPath
        id: sign-installer
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: 'Silt'
          signing-policy-slug: 'release-signing'
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ runner.temp }}/signed-installer

      - name: Replace unsigned installer with signed
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != '' && steps.sign-installer.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          # SignPath returns the signed file under the same basename.
          cp -v "${{ runner.temp }}/signed-installer/"*.exe "${{ steps.path.outputs.dir }}/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.artifact }}
          path: ${{ steps.path.outputs.dir }}/*
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: dist-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Attaching release assets:"
          ls -laR release-assets/
          # Use --target with the SHA of the bumped commit (where the tag actually lives).
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --target "${{ needs.prepare.outputs.sha }}" \
            --title "v${{ needs.prepare.outputs.version }}" \
            --generate-notes \
            release-assets/*
