name: CI

# Mirrors the local .githooks/pre-push gates so PRs are gated even when a
# contributor has not installed the hooks locally. A push that fails any of
# these is a push that would have failed the pre-push hook.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (test -race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Test with race detector
        run: go test -race -count=1 ./...

  frontend:
    name: Frontend (check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: svelte-check
        run: npm run check
      - name: vite build
        run: npm run build

  binding-drift:
    name: Wails binding freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        # wails generate module needs the CLI on PATH. Pin to the version in
        # wails.json so the generated output matches what developers run.
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Regenerate bindings
        working-directory: frontend
        run: npm run generate
      - name: Fail on drift
        run: |
          if [ -n "$(git status --porcelain frontend/wailsjs)" ]; then
            echo "::error::Wails JS bindings are out of date. Run 'npm run generate' (from frontend/) and commit the result."
            git status --porcelain frontend/wailsjs
            exit 1
          fi
