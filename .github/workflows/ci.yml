name: CI

# Mirrors the local .githooks/pre-push gates so PRs are gated even when a
# contributor has not installed the hooks locally.
#
# Note on generated assets: both `frontend/dist/` (the vite build output) and
# `frontend/wailsjs/` (the Go→JS binding stubs) are gitignored build artifacts.
# They are NOT committed, so a fresh CI checkout has neither. CI regenerates
# them in the right order before any step that consumes them:
#   1. placeholder frontend/dist  (lets `wails generate module` compile the
#      //go:embed all:frontend/dist directive)
#   2. npm run generate           (writes frontend/wailsjs from live Go sigs)
#   3. npm run build              (real vite build → real frontend/dist, and
#                                  resolves the wailsjs imports)
#   4. npm run check / go build / go test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (Go -race + frontend check/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        # wails generate module reflects the Go App signatures into JS.
        # Derive the CLI version from go.mod so CI always matches the
        # library the project actually builds against (a hardcoded pin here
        # would silently drift the moment go.mod bumps wails).
        run: |
          WAILS_VERSION=$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2)
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}

      - name: Install frontend dependencies
        working-directory: frontend
        # npm install (not ci) because the lockfile is generated on Windows
        # and may not include all Linux-specific optional dependencies
        # (e.g. @esbuild/linux-x64). npm install resolves missing platform
        # packages; npm ci requires a perfectly synced lockfile.
        run: npm install

      - name: Placeholder frontend/dist
        # `wails generate module` compiles main.go, whose //go:embed
        # all:frontend/dist requires the directory to exist. Drop a minimal
        # placeholder so generation can run before the real vite build.
        run: |
          mkdir -p frontend/dist
          printf '<!doctype html><html><head><title>ci</title></head><body></body></html>' > frontend/dist/index.html

      - name: Regenerate Wails bindings
        working-directory: frontend
        run: npm run generate

      - name: Build frontend (vite)
        working-directory: frontend
        run: npm run build

      - name: svelte-check
        working-directory: frontend
        run: npm run check

      - name: Frontend unit tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Build Go
        run: go build ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...
