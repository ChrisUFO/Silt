name: CI

# Mirrors the local .githooks/pre-push gates so PRs are gated even when a
# contributor has not installed the hooks locally.
#
# Note on generated assets: both `frontend/dist/` (the vite build output) and
# `frontend/wailsjs/` (the Go→JS binding stubs) are gitignored build artifacts.
# They are NOT committed, so a fresh CI checkout has neither. The flow below
# regenerates them in the right order before any step that consumes them:
#   1. npm install                (the `prepare` script seeds a placeholder
#                                  frontend/dist/.gitkeep AND regenerates
#                                  frontend/wailsjs/ from live Go App sigs)
#   2. npm run build              (real vite build → real frontend/dist, and
#                                  resolves the wailsjs imports)
#   3. npm run check / go build / go test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (Go -race + frontend check/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        # wails generate module reflects the Go App signatures into JS.
        # Derive the CLI version from go.mod so CI always matches the
        # library the project actually builds against (a hardcoded pin here
        # would silently drift the moment go.mod bumps wails).
        run: |
          WAILS_VERSION=$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2)
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}

      - name: Install frontend dependencies
        working-directory: frontend
        # npm install (not ci) because the lockfile is generated on Windows
        # and may not include all Linux-specific optional dependencies
        # (e.g. @esbuild/linux-x64). npm install resolves missing platform
        # packages; npm ci requires a perfectly synced lockfile. The `prepare`
        # script also regenerates frontend/wailsjs/ from the live Go App
        # signatures (CONTRIBUTING.md §"Wails bindings"), and seeds a
        # placeholder frontend/dist/.gitkeep that lets `vite build` overwrite.
        run: npm install

      - name: Build frontend (vite)
        working-directory: frontend
        run: npm run build

      - name: svelte-check
        working-directory: frontend
        run: npm run check

      - name: Frontend unit tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Build Go
        run: go build ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...

  # F8 (#242): dependency + secret scanning. Runs parallel to build-and-test
  # so a vulnerable transitive dep or a leaked secret fails the PR fast.
  #
  # IMPORTANT: this job MUST be added to the "required status checks" list in
  # GitHub branch protection (Settings → Branches → main → Require status
  # checks) before the PR merging — the gate only enforces what branch
  # protection requires. The job name below is what to look for in the picker.
  #
  # npm audit uses --omit=dev so dev-only advisories (e.g. undici pulled by
  # Vite's own tooling) don't redden the gate; --audit-level=high means only
  # high+critical in the prod tree blocks merge. govulncheck reports only
  # reachable vulns (uncalled advisories are printed but don't fail). gitleaks
  # scans full history (fetch-depth: 0) so a secret introduced and removed in
  # any prior commit is still caught.
  security:
    name: Dependency + secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks needs full history

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck (reachable vulnerabilities)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (prod tree, high+critical)
        working-directory: frontend
        # npm install (not ci) for the same platform-specific optional-dep
        # reason as build-and-test. --omit=dev scopes to the prod tree so
        # dev-only advisories don't redden the gate; --audit-level=high means
        # only high/critical blocks merge.
        run: |
          npm install
          npm audit --omit=dev --audit-level=high

      - name: gitleaks (secrets in full history)
        # Run the gitleaks CLI directly rather than via gitleaks-action, which
        # requires a paid license for organization repos. The CLI binary is
        # identical; only the action wrapper charges. gh release download
        # fetches the latest stable binary for linux-x64.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo gitleaks/gitleaks --pattern "gitleaks_*_linux_x64.tar.gz" --output /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          chmod +x /tmp/gitleaks
          /tmp/gitleaks detect --source . --no-banner --verbose --redact
